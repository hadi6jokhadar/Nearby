name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on: git tag v1.0.2 && git push --tags

jobs:
  build-sign-publish-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer certificate into temporary keychain
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "ci-password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci-password" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "ci-password" "$KEYCHAIN_PATH"

      - name: Build renderer
        run: npm run build

      - name: Sign, notarize, and publish macOS DMG
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN:                    ${{ github.token }}
        run: npx electron-builder --mac --config electron-builder.config.js --publish always

  build-sign-publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package unsigned Windows installer
        run: npx electron-builder --win --config electron-builder.config.js --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Sign installer with SignPath
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          Install-Module -Name SignPath -Repository PSGallery -Force -Scope CurrentUser
          $unsigned = (Get-ChildItem "release" -Filter "*.exe" | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path "release/signed" | Out-Null
          $signed = "release/signed/$((Get-Item $unsigned).Name)"
          Submit-SigningRequest `
            -InputArtifactPath  $unsigned `
            -OutputArtifactPath $signed `
            -ApiToken           $env:SIGNPATH_API_TOKEN `
            -OrganizationId     "a819449d-c11d-486c-aa45-f028e771412d" `
            -ProjectSlug        "nearby" `
            -SigningPolicySlug  "test-release-signing" `
            -ArtifactConfigurationSlug "initial" `
            -WaitForCompletion

      - name: Generate latest.yml for auto-updater
        shell: pwsh
        run: |
          $exe = Get-ChildItem "release/signed" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No signed .exe found in release/signed" }
          $fs = [System.IO.File]::OpenRead($exe.FullName)
          $hashBytes = [System.Security.Cryptography.SHA512]::Create().ComputeHash($fs)
          $fs.Close()
          $sha512 = [Convert]::ToBase64String($hashBytes)
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $date = (Get-Date -Format "o")
          $yaml  = "version: $version`n"
          $yaml += "files:`n"
          $yaml += "  - url: $($exe.Name)`n"
          $yaml += "    sha512: $sha512`n"
          $yaml += "    size: $($exe.Length)`n"
          $yaml += "path: $($exe.Name)`n"
          $yaml += "sha512: $sha512`n"
          $yaml += "releaseDate: '$date'"
          [System.IO.File]::WriteAllText("release/signed/latest.yml", $yaml)

      - name: Publish signed installer and latest.yml to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/signed/*.exe
            release/signed/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
